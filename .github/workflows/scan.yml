name: Matrix 18.1 Daily Scan

on:
  schedule:
    - cron: '15 14 * * 1-5'   # 7:45 PM IST = 14:15 UTC, Mon-Fri
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas numpy

      - name: Run Matrix 18.1 scan
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python scan.py

      - name: Upload results via GitHub API
        if: always()
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python scripts/upload_results.py
