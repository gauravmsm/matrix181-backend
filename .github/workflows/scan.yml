name: Matrix 18.1 Daily Scan

on:
  schedule:
    - cron: '15 14 * * 1-5'   # 7:45 PM IST = 14:15 UTC, Mon-Fri
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas numpy

      - name: Run Matrix 18.1 scan
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python scan.py

      - name: Upload results via GitHub API
        if: always()
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          python3 - << 'PYEOF'
import os, requests, base64
PAT  = os.environ.get("PAT_TOKEN","")
if not PAT: exit(0)
import json
try:
    data = json.load(open("results/matrix181_results.json"))
    print(f"File size: {os.path.getsize('results/matrix181_results.json')} bytes")
except: exit(0)
url  = "https://api.github.com/repos/gauravmsm/matrix181-backend/contents/results/matrix181_results.json"
hdrs = {"Authorization": f"token {PAT}", "Accept": "application/vnd.github.v3+json"}
sha  = None
try:
    r = requests.get(url, headers=hdrs, timeout=15)
    if r.status_code == 200:
        sha = r.json().get("sha")
        print(f"GET status: {r.status_code}")
        print(f"Existing SHA: {sha}")
except: pass
body = {"message": f"scan results", "content": base64.b64encode(open("results/matrix181_results.json","rb").read()).decode(), "branch": "main"}
if sha: body["sha"] = sha
r = requests.put(url, headers=hdrs, json=body, timeout=30)
print(f"PUT status: {r.status_code}")
if r.status_code in (200,201):
    print("SUCCESS — file saved")
    raw = r.json().get("content",{}).get("download_url","")
    print(f"URL: {raw}")
PYEOF
