name: Weekly Fundamentals Fetch

on:
  schedule:
    - cron: '30 2 * * 0'   # Sunday 2:30 AM UTC = 8:00 AM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-fundamentals:
    runs-on: ubuntu-latest
    timeout-minutes: 90        # Full 2452 stocks ~8 min, give 90min buffer
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pandas
          pip install yfinance --upgrade   # ensure latest version

      - name: Run fundamentals fetcher (full universe)
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python scripts/fundamentals_fetch.py
        # Fetches all SHARES_MAP stocks (~2452)
        # Skips stocks updated in last 7 days
        # Pushes progress every 100 stocks
        # Final push at end
