name: Weekly Fundamentals Fetch

on:
  schedule:
    - cron: '30 2 * * 0'   # Sunday 2:30 AM UTC = 8:00 AM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-fundamentals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}   # ← PAT_TOKEN not GITHUB_TOKEN
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run fundamentals fetcher
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python scripts/fundamentals_fetch.py

      - name: Commit and push fundamentals.json
        run: |
          git config user.name  "MATRIX Bot"
          git config user.email "matrix-bot@gauravmsm.github"
          git add data/fundamentals.json || true
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "fundamentals update $(date +%Y-%m-%d)"
          git push origin main
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
