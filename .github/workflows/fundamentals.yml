name: Weekly Fundamentals Fetch

on:
  schedule:
    - cron: '30 2 * * 0'   # Sunday 2:30 AM UTC = 8:00 AM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-fundamentals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run fundamentals fetcher
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python scripts/fundamentals_fetch.py
        # fundamentals_fetch.py already pushes via GitHub API (push_github())
        # No separate git push needed — that caused the duplicate push conflict
