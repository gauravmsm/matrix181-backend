name: Weekly Fundamentals Fetch

on:
  schedule:
    - cron: '30 2 * * 0'   # Sunday 8:00 AM IST = 2:30 UTC
    - cron: '30 2 * * 3'   # Wednesday 8:00 AM IST = extra run midweek
  workflow_dispatch:        # manual trigger anytime

permissions:
  contents: write

jobs:
  fetch-fundamentals:
    runs-on: ubuntu-latest
    timeout-minutes: 120     # 2452 stocks × 1.5s + pauses ≈ 90 min

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pandas yfinance --upgrade --quiet

      - name: Run fundamentals fetcher
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python scripts/fundamentals_fetch.py
        # Features:
        # - 1.5s delay between stocks (rate limit protection)
        # - 45s pause every 50 stocks + push progress
        # - Skips stocks updated within 7 days (incremental)
        # - Resume-safe: progress pushed every 50 stocks
        # - Fallback: yfinance only (FMP optional)
