name: Patch Matrix182 JSX

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout frontend repo
        uses: actions/checkout@v4
        with:
          repository: gauravmsm/matrix181--frontend-
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply patch
        run: |
          python3 - << 'EOF'
          import sys

          with open('src/Matrix182.jsx', 'r') as f:
              content = f.read()

          changed = False

          # Patch 1: Add safeParseJSON helper
          if 'const safeParseJSON' not in content:
              safe_fn = """
const safeParseJSON = async (response) => {
  const text = await response.text();
  const clean = text
    .replace(/:\\s*NaN\\b/g, ': null')
    .replace(/:\\s*Infinity\\b/g, ': null');
  return JSON.parse(clean);
};
"""
              content = content.replace(
                  'const TABS = ["ALL", "A+", "A", "B+", "B"];',
                  'const TABS = ["ALL", "A+", "A", "B+", "B"];' + safe_fn
              )
              print("Added safeParseJSON")
              changed = True
          else:
              print("safeParseJSON already present")

          # Patch 2: Replace footnote with Run Full Veto button
          OLD_FN = '            <div style={{marginTop:8,fontSize:10,color:"#2d3748",fontStyle:"italic"}}>\n              V1/V2/V4/V5/V6/V9/V10/V13/V14/V15/V16/V18/V19 require on-demand analysis via veto.js\n            </div>'
          NEW_BTN = '''            <div style={{marginTop:12}}>
              <button onClick={()=>setVetoOpen(true)}
                style={{width:"100%",background:"rgba(16,185,129,0.12)",
                  border:"1px solid rgba(16,185,129,0.3)",borderRadius:8,
                  padding:"10px 16px",cursor:"pointer",
                  color:"#10b981",fontWeight:700,fontSize:12,
                  letterSpacing:"0.04em",display:"flex",
                  alignItems:"center",justifyContent:"center",gap:8}}>
                🔍 Run Full Veto (V1\u201320, All Sources)
                <span style={{fontSize:10,fontWeight:400,color:"#4a5568"}}>
                  NSE · BSE · Screener · Moneycontrol · ~15s
                </span>
              </button>
            </div>'''

          if OLD_FN in content:
              content = content.replace(OLD_FN, NEW_BTN)
              print("Added Run Full Veto button")
              changed = True
          elif 'Run Full Veto' in content:
              print("Run Full Veto button already present")
          else:
              print("WARNING: Could not find footnote to replace")

          if changed:
              with open('src/Matrix182.jsx', 'w') as f:
                  f.write(content)
              print("File updated")
          else:
              print("No changes needed")
          EOF

      - name: Commit and push
        run: |
          git config user.name "MATRIX Bot"
          git config user.email "matrix@gauravmsm.github"
          git add src/Matrix182.jsx
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix: add safeParseJSON + Run Full Veto button"
            git push origin main
            echo "Pushed successfully"
          fi
        env:
          GIT_AUTHOR_NAME: MATRIX Bot
          GIT_COMMITTER_NAME: MATRIX Bot
