name: Patch Matrix182 JSX

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backend repo (contains patch script)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          path: backend

      - name: Checkout frontend repo
        uses: actions/checkout@v4
        with:
          repository: gauravmsm/matrix181--frontend-
          token: ${{ secrets.PAT_TOKEN }}
          path: frontend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run patch script
        run: python3 backend/scripts/patch_matrix_jsx.py

      - name: Commit and push to frontend repo
        run: |
          cd frontend
          git config user.name "MATRIX Bot"
          git config user.email "matrix@gauravmsm.github"
          git add src/Matrix182.jsx
          if git diff --staged --quiet; then
            echo "No changes to commit — already up to date"
          else
            git commit -m "fix: safeParseJSON + Run Full Veto button"
            git push origin main
            echo "✅ Pushed to frontend repo"
          fi
